name: Retrain

on:
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: retrain
  cancel-in-progress: true

jobs:
  retrain:
    name: Ingest → Features → Train → Export
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ingest data
        run: make ingest
        env:
          MTA_API_KEY: ${{ secrets.MTA_API_KEY }}

      - name: Build features
        run: make features

      - name: Train models
        run: make train

      - name: Export to ONNX
        run: make export

      - name: Check for updated ONNX artifacts
        id: check_artifacts
        run: |
          git add models/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated ONNX artifacts
        if: steps.check_artifacts.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="retrain/$(date -u +%Y-%m-%d)-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit -m "chore: update ONNX artifacts ($(date -u +%Y-%m-%d))"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        id: push_branch

      - name: Open pull request for updated artifacts
        if: steps.check_artifacts.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = "${{ steps.push_branch.outputs.branch }}";
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  branch,
              base:  "main",
              title: `chore: retrain – updated ONNX artifacts ${new Date().toISOString().slice(0, 10)}`,
              body:  "Automated weekly retrain. Please review updated ONNX artifacts and metrics before merging.",
            });
