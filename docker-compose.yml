  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   command: python -m pulsecast.data.ingest.subway_rt
  #   environment:
  #     MTA_API_KEY: ${MTA_API_KEY:-}
  #     SUBWAY_FEED_IDS: ${SUBWAY_FEED_IDS:-GTR,ACE,BDFM,G,JZ,NQRW,L,SIR}
  #     MTA_FEED_URL_PATTERN: ${MTA_FEED_URL_PATTERN:-https://api.mta.info/GTFS/{feed_id}}
  #     TIMESCALE_DSN: postgresql://pulsecast:pulsecast@timescaledb:5432/pulsecast
  #   depends_on:
  #     timescaledb:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "pgrep -f subway_rt || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Bus Positions poller – streams travel_time_var into TimescaleDB
  # ─────────────────────────────────────────────────────────────────────────
  # bus-poller:  # deferred: subway and bus ingestion not yet active
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   command: python -m pulsecast.data.ingest.bus_positions
  #   environment:
  #     BUS_POSITIONS_BUCKET: ${BUS_POSITIONS_BUCKET:-nycbuspositions}
  #     TIMESCALE_DSN: postgresql://pulsecast:pulsecast@timescaledb:5432/pulsecast
  #   depends_on:
  #     timescaledb:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "pgrep -f bus_positions || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI serving layer
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      uvicorn pulsecast.serving.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
    environment:
      TIMESCALE_DSN: postgresql://pulsecast:pulsecast@timescaledb:5432/pulsecast
      REDIS_URL: redis://redis:6379/0
      ONNX_DIR: /app/models/onnx
      N_FEATURES: "54"
    volumes:
      - onnx_models:/app/models/onnx:ro
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  timescale_data:
  mlflow_artifacts:
  onnx_models:
