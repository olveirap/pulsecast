services:
  # ─────────────────────────────────────────────────────────────────────────
  # TimescaleDB – time-series storage
  # ─────────────────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulsecast
      POSTGRES_USER: pulsecast
      POSTGRES_PASSWORD: pulsecast
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./pulsecast/data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsecast -d pulsecast"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────────────
  # Redis – forecast cache
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # MLflow – experiment tracking
  # ─────────────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    restart: unless-stopped
    command: >
      mlflow server
      --backend-store-uri postgresql://pulsecast:pulsecast@timescaledb:5432/pulsecast
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # Subway RT poller – streams MTA mean_delay into TimescaleDB
  # ─────────────────────────────────────────────────────────────────────────
